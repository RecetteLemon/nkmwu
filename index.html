<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유니온 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root { --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc; --text-muted: #94a3b8; --neon-blue: #38bdf8; --neon-purple: #c084fc; --neon-green: #34d399; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        
        .glass-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); transition: transform 0.3s; }
        .glass-card:hover { transform: translateY(-5px); }

        .nav-pills .nav-link { color: var(--text-muted); border-radius: 30px; padding: 10px 24px; margin: 0 5px; font-weight: 600; transition: all 0.4s; }
        .nav-pills .nav-link.active { background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); color: white; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); transform: scale(1.05); }

        .neon-text { color: transparent; background-clip: text; -webkit-background-clip: text; background-image: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); font-weight: bold; }

        .form-select { background-color: rgba(15, 23, 42, 0.8); color: white; border: 1px solid var(--neon-blue); border-radius: 10px; }
        .form-select:focus { background-color: rgba(15, 23, 42, 0.9); color: white; box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25); }
        
        /* 로딩 스크린 */
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-color); z-index: 1000; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="spinner"></div>
        <h4 class="neon-text">유니온 데이터를 동기화 중입니다...</h4>
    </div>

    <div class="container py-5 d-none" id="appContent">
        <h2 class="text-center mb-5 fw-bold text-white">✨ 유니온 <span class="neon-text">데이터 대시보드</span></h2>

        <ul class="nav nav-pills justify-content-center mb-5" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation"><button class="nav-link active" id="tab-overview" data-bs-toggle="pill" data-bs-target="#overview" type="button" role="tab">🏆 종합</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="tab-raid" data-bs-toggle="pill" data-bs-target="#raid" type="button" role="tab">⚔️ 레이드</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="tab-member" data-bs-toggle="pill" data-bs-target="#member" type="button" role="tab">👤 멤버</button></li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
            <div class="tab-pane fade show active" id="overview" role="tabpanel">
                <div class="row g-4 mb-4">
                    <div class="col-md-6"><div class="glass-card text-center"><h5 class="text-muted mb-2">최근 유니온 랭크</h5><h1 class="display-4 fw-bold text-white"><span id="summaryRank" style="color: var(--neon-green)">0</span><span class="fs-4 text-muted">위</span></h1></div></div>
                    <div class="col-md-6"><div class="glass-card text-center"><h5 class="text-muted mb-2">모든 시즌 누적 딜량</h5><h1 class="display-4 fw-bold text-white"><span id="summaryDamage" class="neon-text">0</span><span class="fs-4 text-muted">M</span></h1></div></div>
                </div>
                <div class="row g-4">
                    <div class="col-md-6"><div class="glass-card"><canvas id="chartRank"></canvas></div></div>
                    <div class="col-md-6"><div class="glass-card"><canvas id="chartTotalDmg"></canvas></div></div>
                </div>
            </div>

            <div class="tab-pane fade" id="raid" role="tabpanel">
                <div class="glass-card mb-4">
                    <div class="row align-items-center">
                        <div class="col-md-4"><label class="form-label text-muted">시즌 선택</label><select class="form-select" id="seasonSelect" onchange="renderRaid()"></select></div>
                        <div class="col-md-8 text-md-end mt-3 mt-md-0"><h4 id="raidSummaryText" class="mb-0 text-white">로딩중...</h4></div>
                    </div>
                </div>
                <div class="glass-card"><canvas id="chartRaid"></canvas></div>
            </div>

            <div class="tab-pane fade" id="member" role="tabpanel">
                <div class="glass-card mb-4">
                    <div class="row align-items-center">
                        <div class="col-md-4"><label class="form-label text-muted">지휘관 검색</label><select class="form-select" id="memberSelect" onchange="renderMember()"></select></div>
                        <div class="col-md-8 text-md-end mt-3 mt-md-0"><h4 id="memberSummaryText" class="mb-0 text-white">로딩중...</h4></div>
                    </div>
                </div>
                <div class="glass-card"><canvas id="chartMember"></canvas></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // =========================================================================
        // 🚨 여기에 구글 API URL을 입력하세요!
        // =========================================================================
        const BASE_API_URL = "https://script.google.com/macros/s/AKfycbxee67WrcVxA4PjmWcvHqmMWNm2qrdWcRqWNfup9VnsWs5VBCCnJaoKwBFSzKAQpn-VFQ/exec"; 
        
        let db = null;
        let charts = {};

        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Pretendard';

        // 🚀 페이지 접속 즉시 데이터 로딩 시작
        async function fetchAndInitDashboard() {
            try {
                const response = await fetch(BASE_API_URL);
                const result = await response.json();

                if(!result.success) {
                    document.getElementById("loadingScreen").innerHTML = `<h4 class="text-danger">오류 발생: ${result.error}</h4>`;
                    return;
                }

                db = result.data;

                // 드롭다운 세팅
                const seasonSelect = document.getElementById("seasonSelect");
                [...db.seasons].reverse().forEach(s => seasonSelect.add(new Option("시즌 " + s, s)));

                const membersSet = new Set(db.records.map(r => r.nickname));
                const memberSelect = document.getElementById("memberSelect");
                [...membersSet].sort().forEach(m => memberSelect.add(new Option(m, m)));

                // 부드러운 화면 전환 애니메이션
                gsap.to("#loadingScreen", { opacity:
