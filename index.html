<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유니온 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc; --text-muted: #94a3b8; --neon-blue: #38bdf8; --neon-purple: #c084fc; --neon-green: #34d399; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        .neon-text { color: transparent; background-clip: text; -webkit-background-clip: text; background-image: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); font-weight: bold; }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-color); z-index: 1000; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loadingScreen">
        <div class="spinner"></div>
        <h4 class="neon-text" id="loadingText">1. 데이터 요청 준비 중...</h4>
        <p id="debugLog" class="text-warning mt-3" style="font-family: monospace;"></p>
    </div>
    
    <div class="container py-5 d-none" id="appContent">
        <h2 class="text-center">✨ 데이터 로딩 성공! ✨</h2>
    </div>

    <script>
        // =========================================================================
        const BASE_API_URL = "https://script.google.com/macros/s/AKfycbxAqN1LQ-oo2eNmdHjr2GsY2riBLjyAXeDYFk9dmbqTdQsddRGbPatENt5wDkY43JBHrg/exec"; 
        // =========================================================================

        function logStep(text) {
            console.log(text);
            document.getElementById("loadingText").innerText = text;
        }

        async function fetchAndInitDashboard() {
            try {
                logStep("2. 구글 서버로 똑똑 문 두드리는 중...");
                
                // 데이터 요청 시작
                const response = await fetch(BASE_API_URL);
                
                logStep(`3. 구글 응답 도착! (상태 코드: ${response.status})`);
                
                // 데이터를 텍스트로 먼저 받아보기 (에러 방지)
                const textData = await response.text();
                console.log("받아온 데이터 원본:", textData.substring(0, 200) + "...");

                logStep("4. 데이터 번역(JSON 변환) 중...");
                const result = JSON.parse(textData);

                if(!result.success) {
                    logStep("❌ 구글 서버 내부 에러: " + result.error);
                    return;
                }

                logStep("✅ 5. 모든 준비 완료! 대시보드 켭니다.");
                document.getElementById("loadingScreen").style.display = "none";
                document.getElementById("appContent").classList.remove("d-none");

            } catch (error) {
                console.error(error);
                logStep("❌ 치명적 오류 발생! F12를 눌러 확인해주세요.");
                document.getElementById("debugLog").innerText = "에러 내용: " + error.message;
            }
        }

        document.addEventListener("DOMContentLoaded", fetchAndInitDashboard);
    </script>
</body>
</html>
